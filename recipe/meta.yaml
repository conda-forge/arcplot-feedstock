{% set python_min = "3.10.0" %}
{% set name = "arcplot" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/arcplot-{{ version }}.tar.gz
  sha256: 2da8edf5095d3d70c3231bd96656c24b942435af934cae894df3907d69ed93c7

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry-core
    - pip
  run:
    - python >={{ python_min }}
    - contourpy 1.2.0
    - cycler 0.12.1
    - fonttools 4.48.1
    - kiwisolver 1.4.5
    - matplotlib-base 3.8.2
    - numpy 1.26.4
    - packaging 23.2
    - pillow 10.2.0
    - pyparsing 3.1.1
    - python-dateutil 2.8.2
    - six 1.16.0
    - pandas 2.2.1

test:
  imports:
    - arcplot
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/szkics/arcplot
  summary: arcplot is a library based on matplotlib for seamless creation of custom arc diagrams.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Matt-BF
